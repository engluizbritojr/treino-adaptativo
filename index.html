// ── REDUCER ──────────────────────────────────────────────────────
function reducer(state, action) {
  const s = JSON.parse(JSON.stringify(state));
  const w = s.weeks.find(w=>w.num===s.currentWeek);
  switch(action.type) {
    case 'SET_WEEK': return {...s,currentWeek:action.num};
    case 'SET_TAB': return {...s,currentTab:action.tab};
    case 'SET_CARDIO': if(w)w['cardio'+action.tab]=action.val; return s;
    case 'SET_CARGA':
      s.weeks.forEach(w=>['A','B'].forEach(t=>{const ex=w[t].find(e=>e.id===action.id);if(ex)ex.carga=action.v;})); return s;
    case 'SET_OBS_EX':
      s.weeks.forEach(w=>['A','B'].forEach(t=>{const ex=w[t].find(e=>e.id===action.id);if(ex)ex.obs=action.v;})); return s;
    case 'TOGGLE_SERIE':
      s.weeks.forEach(w=>['A','B'].forEach(t=>{const ex=w[t].find(e=>e.id===action.id);if(ex)ex.doneSeries=(ex.doneSeries||0)>action.i?action.i:action.i+1;})); return s;
    case 'DEL_EX':
      s.weeks.forEach(w=>{w.A=w.A.filter(e=>e.id!==action.id);w.B=w.B.filter(e=>e.id!==action.id);}); return s;
    case 'ADD_EX': if(w)w[s.currentTab].push(action.ex); return s;
    case 'ADD_SESSION':
      s.sessions.push(action.sess);
      s.sessions.sort((a,b)=>b.date.localeCompare(a.date)); return s;
    case 'DEL_SESSION': s.sessions=s.sessions.filter(ss=>ss.id!==action.id); return s;
    case 'ADD_WEEK': {
      const prev=s.weeks[s.weeks.length-1];
      const cl=t=>prev[t].map(e=>({...JSON.parse(JSON.stringify(e)),id:uid(),obs:'',doneSeries:0}));
      s.weeks.push({num:action.num,dates:action.dates,cardioA:mkCardio(),cardioB:mkCardio(),A:cl('A'),B:cl('B')});
      s.currentWeek=action.num; return s;
    }
    case 'IMPORT': return {...action.data};
    case 'RESET': return JSON.parse(JSON.stringify(DEFAULT));
    default: return s;
  }
}

// ── DASHBOARD ────────────────────────────────────────────────────
function Dashboard({state,onGoTreino}) {
  const {sessions,weeks,currentWeek} = state;
  const total = sessions.length;
  const cardios = sessions.filter(s=>s.cardio).length;

  // streak
  const dates=[...new Set(sessions.map(s=>s.date))].sort().reverse();
  let streak=0;
  if(dates.length){
    let cur=new Date(today());
    for(const d of dates){
      const ds=cur.toISOString().slice(0,10);
      if(d===ds){streak++;cur.setDate(cur.getDate()-1);}
      else if(d<ds)break;
    }
  }
  const lastSess=sessions[0];
  const nextTab=lastSess?(lastSess.tab==='A'?'B':'A'):'A';

  // calendário
  const dow=new Date().getDay();
  const monday=new Date();monday.setDate(new Date().getDate()-(dow===0?6:dow-1));
  const days=['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  const calDays=Array.from({length:7},(_,i)=>{
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    const iso=d.toISOString().slice(0,10);
    const ds=sessions.filter(s=>s.date===iso);
    return{iso,num:d.getDate(),lbl:days[i],sessions:ds,isToday:iso===today()};
  });

  // evo
  const allNames=[...new Set(weeks.flatMap(w=>[...w.A,...w.B].map(e=>e.name)))];
  const evoItems=allNames.map(name=>{
    const hist=weeks.flatMap(w=>{
      const ex=[...w.A,...w.B].find(e=>e.name===name);
      return ex&&ex.carga&&ex.carga!=='—'&&ex.carga!==''?[{week:w.num,n:getN(ex.carga)||0}]:[];
    });
    if(hist.length<2)return null;
    const mx=Math.max(...hist.map(h=>h.n),1);
    const delta=hist[hist.length-1].n-hist[0].n;
    return{name,hist,mx,delta};
  }).filter(Boolean);

  const e=React.createElement;
  return e('div',{style:{padding:'16px 16px 0'}},
    // Hero
    e('div',{style:{background:`linear-gradient(135deg,${C.gdim},${C.bdim})`,border:`1px solid ${C.border2}`,borderRadius:12,padding:18,marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}},
      e('div',null,
        e('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,color:C.green,lineHeight:1}},`${streak} dia${streak!==1?'s':''}`),
        e('div',{style:{fontSize:12,color:C.muted,marginTop:4}},streak>0?'de sequência ativa 🔥':'sem treino hoje ainda'),
        e('div',{style:{fontSize:12,color:C.muted,marginTop:10}},lastSess?`Último: Treino ${lastSess.tab} em ${fmtDate(lastSess.date)} → Próximo: ${nextTab}`:'Comece com o Treino A 💪')
      ),
      e('div',{style:{textAlign:'center',flexShrink:0}},
        e('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:36,fontWeight:900,color:C.green,lineHeight:1}},total),
        e('div',{style:{fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'.05em'}},'treinos')
      )
    ),
    // Stats
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20}},
      [['Sessões',total],['Sem. atual',currentWeek],['Cardios',cardios]].map(([l,v])=>
        e('div',{key:l,style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:'14px 8px',textAlign:'center'}},
          e('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,color:C.green,lineHeight:1}},v),
          e('div',{style:{fontSize:10,color:C.muted,marginTop:4,textTransform:'uppercase',letterSpacing:'.04em'}},l)
        )
      )
    ),
    // Periodização
    e('div',{style:SECTION_TITLE},e('span',{style:{width:3,height:15,background:C.green,borderRadius:2,display:'inline-block'}}),'Periodização — 4 Semanas'),
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:20}},
      weeks.map(w=>{
        const ws=sessions.filter(s=>s.week===w.num).length;
        const isCur=w.num===currentWeek;
        const pct=Math.min(ws/6*100,100);

// ── TREINO PAGE ──────────────────────────────────────────────────
function TreinoPage({state,dispatch,showToast}) {
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState('');
  const [newReps,setNewReps]=useState('');
  const [newSer,setNewSer]=useState('3');
  const [modal,setModal]=useState(null);
  const [ciTab,setCiTab]=useState(state.currentTab);
  const [ciDate,setCiDate]=useState(today());
  const [ciCardio,setCiCardio]=useState('');
  const [ciObs,setCiObs]=useState('');
  const [nwNum,setNwNum]=useState('');
  const [nwDates,setNwDates]=useState('');

  const w=state.weeks.find(wk=>wk.num===state.currentWeek);
  const tab=state.currentTab;
  const exs=w?w[tab]:[];
  const cardio=w?(w['cardio'+tab]||{feito:false,tipo:'',tempo:''}):({feito:false,tipo:'',tempo:''});
  const wSessions=state.sessions.filter(s=>s.week===state.currentWeek).sort((a,b)=>a.date.localeCompare(b.date));

  // evo
  const names=[...new Set(state.weeks.flatMap(wk=>wk[tab].map(e=>e.name)))];
  const evoItems=names.map(name=>{
    const hist=state.weeks.map(wk=>{const ex=wk[tab].find(e=>e.name===name);return{week:wk.num,carga:ex?ex.carga:''};}).filter(r=>r.carga&&r.carga!=='—'&&r.carga!=='');
    if(!hist.length)return null;
    const mx=Math.max(...hist.map(r=>getN(r.carga)||0),1);
    const f=getN(hist[0].carga),l=getN(hist[hist.length-1].carga);
    return{name,hist,mx,delta:(l&&f)?+(l-f).toFixed(1):0};
  }).filter(Boolean);

  function confirmSession(){
    if(!ciDate)return;
    dispatch({type:'ADD_SESSION',sess:{id:uid(),date:ciDate,tab:ciTab,week:state.currentWeek,cardio:!!ciCardio,tipo:ciCardio,tempo:'',obs:ciObs}});
    setModal(null);setCiDate(today());setCiCardio('');setCiObs('');
    showToast('✓ Sessão registrada!');
  }
  function confirmNewWeek(){
    const num=parseInt(nwNum);if(!num)return;
    dispatch({type:'ADD_WEEK',num,dates:nwDates});
    setModal(null);showToast('✓ Semana adicionada!');
  }
  function addEx(){
    if(!newName.trim())return;
    dispatch({type:'ADD_EX',ex:{id:uid(),name:newName.trim(),sub:'',reps:newReps.trim()||'12–15 reps',series:parseInt(newSer)||3,carga:'',obs:'',doneSeries:0}});
    setNewName('');setNewReps('');setNewSer('3');setShowAdd(false);
    showToast('✓ Exercício adicionado');
  }

  const e=React.createElement;
  return e('div',{style:{padding:'16px 16px 0'}},
    // Week scroll
    e('div',{style:{display:'flex',gap:6,overflowX:'auto',paddingBottom:10,marginBottom:14,scrollbarWidth:'none'}},
      state.weeks.map(wk=>e('button',{key:wk.num,onClick:()=>dispatch({type:'SET_WEEK',num:wk.num}),style:{background:wk.num===state.currentWeek?C.green:C.surface,border:`1.5px solid ${wk.num===state.currentWeek?C.green:C.border}`,color:wk.num===state.currentWeek?'#0f0f0f':C.muted,padding:'7px 16px',borderRadius:20,fontSize:13,fontWeight:600,cursor:'pointer',flexShrink:0}},`Semana ${wk.num}`)),
      e('button',{onClick:()=>{setNwNum(String(Math.max(...state.weeks.map(w=>w.num))+1));setNwDates('');setModal({type:'newWeek'});},style:{background:'transparent',border:`1.5px dashed ${C.border}`,color:C.dim,padding:'7px 14px',borderRadius:20,fontSize:13,cursor:'pointer',flexShrink:0}},'+ Semana')
    ),
    // Header
    e('div',{style:{marginBottom:14}},
      e('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,lineHeight:1}},`Semana ${state.currentWeek} / 4`),
      w?.dates&&e('div',{style:{fontSize:12,color:C.muted,marginTop:3}},`📅 ${w.dates}`),
      wSessions.length>0&&e('div',{style:{marginTop:10,display:'flex',flexDirection:'column',gap:6}},
        wSessions.map(sess=>e('div',{key:sess.id,style:{display:'flex',alignItems:'center',gap:10,background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 12px'}},
          e('div',{style:{width:28,height:28,borderRadius:6,background:sess.tab==='A'?C.gdim:C.ydim,color:sess.tab==='A'?C.green:C.yellow,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:900,flexShrink:0}},sess.tab),
          e('div',{style:{flex:1,minWidth:0}},
            e('div',{style:{fontSize:13,fontWeight:600}},fmtDate(sess.date)),
            e('div',{style:{fontSize:11,color:C.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},`Treino ${sess.tab}${sess.cardio&&sess.tipo?' · 🏃 '+sess.tipo:sess.cardio?' · 🏃 Cardio':''}${sess.obs?' · '+sess.obs:''}`)
          ),
          e('button',{onClick:()=>{dispatch({type:'DEL_SESSION',id:sess.id});showToast('Sessão removida');},style:{background:'none',border:'none',color:C.dim,fontSize:14,padding:'2px 6px',cursor:'pointer',borderRadius:4}},'✕')
        ))
      ),
      e('button',{onClick:()=>{setCiTab(tab);setModal({type:'session'});},style:{marginTop:10,width:'100%',padding:10,background:C.gdim,border:`1.5px solid ${C.green}`,color:C.gtext,borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer'}},'+ Registrar sessão de treino')

        `TREINO ${t}`,e('span',{style:{display:'block',fontFamily:"'Inter',sans-serif",fontSize:10,fontWeight:500,color:C.muted,marginTop:2}},t==='A'?'Membros Superiores':'Inferiores + Abdômen')
      ))
    ),
    // Exercícios
    exs.map(ex=>e(ExCard,{key:ex.id,ex,tab,onCarga:v=>dispatch({type:'SET_CARGA',id:ex.id,v}),onObs:v=>dispatch({type:'SET_OBS_EX',id:ex.id,v}),onToggleSerie:i=>dispatch({type:'TOGGLE_SERIE',id:ex.id,i}),onDelete:()=>dispatch({type:'DEL_EX',id:ex.id})})),
    // Add
    e('button',{onClick:()=>setShowAdd(!showAdd),style:{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',padding:11,background:C.surface,border:`1.5px dashed ${C.border}`,borderRadius:12,color:C.dim,fontSize:13,fontWeight:600,cursor:'pointer',marginBottom:8}},'＋ Adicionar exercício'),
    showAdd&&e('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:14,display:'flex',flexDirection:'column',gap:8}},
      e('input',{value:newName,onChange:ev=>setNewName(ev.target.value),placeholder:'Nome do exercício',style:INP}),
      e('div',{style:{display:'flex',gap:8}},
        e('input',{value:newReps,onChange:ev=>setNewReps(ev.target.value),placeholder:'Reps/tempo',style:{...INP,flex:2}}),

    ),
    // Cardio
    e(CardioBlock,{cardio,onChange:val=>dispatch({type:'SET_CARDIO',tab,val})}),

      e('div',{style:{...SECTION_TITLE,marginTop:24}},e('span',{style:{width:3,height:15,background:C.green,borderRadius:2,display:'inline-block'}}),'Evolução de carga'),
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:8,marginBottom:20}},

      e(MField,{label:'Data do treino'},e('input',{type:'date',value:ciDate,max:today(),onChange:ev=>setCiDate(ev.target.value),style:INP})),
      e(MField,{label:'Cardio feito? (tipo e duração)'},e('input',{value:ciCardio,onChange:ev=>setCiCardio(ev.target.value),placeholder:'Ex: Esteira 25 min, Bike 20 min…',style:INP})),
      e(MField,{label:'Observação (opcional)'},e('input',{value:ciObs,onChange:ev=>setCiObs(ev.target.value),placeholder:'Ex: boa disposição, treino pesado…',style:INP}))
    ),
    // Modal nova semana
    e(Modal,{open:modal?.type==='newWeek',title:'Nova Semana',onConfirm:confirmNewWeek,onCancel:()=>setModal(null)},
      e(MField,{label:'Semana nº'},e('input',{type:'number',value:nwNum,onChange:ev=>setNwNum(ev.target.value),min:1,max:20,style:INP})),
      e(MField,{label:'Período'},e('input',{value:nwDates,onChange:ev=>setNwDates(ev.target.value),placeholder:'ex: 20/07 a 26/07',style:INP}))
    )
  );
}

// ── CONFIG PAGE ──────────────────────────────────────────────────
function ConfigPage({state,dispatch,showToast}) {
  const sess=state.sessions.length;
  const cargas=state.weeks.flatMap(w=>[...w.A,...w.B]).filter(e=>e.carga&&e.carga!=='—'&&e.carga!=='').length;
  const [resetConfirm,setResetConfirm]=useState(false);
  const fileRef=useRef();

  function exportData(){
    const json=JSON.stringify(state,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const now=new Date();
    const stamp=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    const a=document.createElement('a');a.href=url;a.download=`treino-backup-${stamp}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('✓ Backup exportado!');
  }
  function importData(ev){
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const parsed=JSON.parse(e.target.result);
        if(!parsed.weeks||!Array.isArray(parsed.weeks))throw new Error('Formato inválido');
        parsed.sessions=(parsed.sessions||[]).map(s=>s.id?s:{...s,id:uid()});
        dispatch({type:'IMPORT',data:parsed});
        showToast('✓ Dados restaurados!');
      }catch(err){alert('Erro ao importar: '+err.message);}
    };
    reader.readAsText(file);ev.target.value='';
  }

  const e=React.createElement;
  const Btn=({color,children,onClick,red})=>e('button',{onClick,style:{flexShrink:0,padding:'9px 14px',border:red?`1px solid ${C.red}`:'none',borderRadius:8,background:red?C.rdim:color,color:red?C.red:'#0f0f0f',fontSize:13,fontWeight:700,cursor:'pointer'}},children);
  const Card=({icon,title,sub,action})=>e('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,display:'flex',alignItems:'center',gap:12,marginBottom:8}},e('div',{style:{fontSize:24,flexShrink:0}},icon),e('div',{style:{flex:1}},e('div',{style:{fontSize:14,fontWeight:600,marginBottom:3}},title),e('div',{style:{fontSize:11,color:C.muted,lineHeight:1.4}},sub)),action);
  const SecTitle=({children})=>e('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,letterSpacing:'.03em',margin:'20px 0 8px',display:'flex',alignItems:'center',gap:8}},e('span',{style:{width:3,height:16,background:C.green,borderRadius:2,display:'inline-block'}}),children);

  return e('div',{style:{padding:'16px 16px 0'}},
    e('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,marginBottom:20}},'Configurações'),
    e(SecTitle,null,'💾 Backup dos dados'),
    e('div',{style:{fontSize:13,color:C.muted,lineHeight:1.5,marginBottom:12}},'Seus dados ficam salvos neste navegador. Exporte regularmente como segurança extra.'),
    e(Card,{icon:'⬇️',title:'Exportar backup',sub:'Baixa um arquivo .json com todos os seus dados — sessões, cargas e anotações.',action:e(Btn,{color:C.green,onClick:exportData},'Exportar')}),
    e(Card,{icon:'⬆️',title:'Importar backup',sub:'Restaura dados de um .json exportado. Substitui todos os dados atuais.',action:e('div',null,e(Btn,{color:C.blue,onClick:()=>fileRef.current.click()},'Importar'),e('input',{ref:fileRef,type:'file',accept:'.json',style:{display:'none'},onChange:importData}))}),
    e(SecTitle,null,'ℹ️ Status'),
    e('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:8}},
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
        [['Sessões',sess],['Semanas',state.weeks.length],['Cargas salvas',cargas],['Semana atual',state.currentWeek]].map(([l,v])=>
          e('div',{key:l},e('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,color:C.green,lineHeight:1}},v),e('div',{style:{fontSize:11,color:C.muted}},l))
        )
      )
    ),
    e(SecTitle,null,'📱 Atalho na tela inicial (iPhone)'),
    [['1','Abra esta URL no Safari do iPhone'],['2','Toque em □↑ (compartilhar) na barra inferior'],['3','Role e toque em "Adicionar à Tela de Início"'],['4','Nomeie "Treino JB" e confirme']].map(([n,t])=>
      e('div',{key:n,style:{display:'flex',alignItems:'center',gap:10,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',marginBottom:6,fontSize:13}},
        e('div',{style:{width:22,height:22,borderRadius:'50%',background:C.green,color:'#0f0f0f',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:900,flexShrink:0}},n),t
      )
    ),
    e('div',{style:{marginTop:24}},
      e(Card,{icon:'🗑️',title:'Resetar todos os dados',sub:'Apaga tudo e volta ao estado inicial. Irreversível sem backup.',action:e(Btn,{red:true,onClick:()=>setResetConfirm(true)},'Resetar')})
    ),
    e(Modal,{open:resetConfirm,title:'Resetar todos os dados',confirmLabel:'Sim, resetar',onConfirm:()=>{dispatch({type:'RESET'});setResetConfirm(false);showToast('Dados resetados');},onCancel:()=>setResetConfirm(false)},
      e('p',{style:{color:C.muted,fontSize:14,lineHeight:1.6}},'Apaga ',e('strong',{style:{color:C.red}},'todos os treinos, sessões e cargas'),'. Faça um Export antes.')
    )
  );
}

// ── APP ──────────────────────────────────────────────────────────
function App() {
  const [state,dispatch]=useReducer(reducer,null,()=>loadState()||JSON.parse(JSON.stringify(DEFAULT)));
  const [page,setPage]=useState('dash');
  const [toast,setToast]=useState({msg:'',visible:false});
  const toastTimer=useRef(null);

  // Auto-save
  useEffect(()=>{saveState(state);},[state]);

  function showToast(msg){
    clearTimeout(toastTimer.current);
    setToast({msg,visible:true});
    toastTimer.current=setTimeout(()=>setToast(t=>({...t,visible:false})),2000);
  }
  function goTreino(num){dispatch({type:'SET_WEEK',num});setPage('treino');}

  const e=React.createElement;
  const NAV=[['dash','📊','Dashboard'],['treino','💪','Treino'],['config','⚙️','Config']];

  return e('div',{style:{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"'Inter',sans-serif",fontSize:14,paddingBottom:80}},
    // Header
    e('div',{style:{position:'sticky',top:0,zIndex:100,background:'rgba(15,15,15,0.97)',borderBottom:`1px solid ${C.border}`,padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      e('div',{style:{display:'flex',alignItems:'center',gap:10}},
        e('div',{style:{width:34,height:34,background:C.green,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:17,color:'#0f0f0f',flexShrink:0}},'JB'),
        e('div',null,
          e('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,letterSpacing:'.02em',lineHeight:1}},'Treino Adaptativo'),
          e('div',{style:{fontSize:11,color:C.muted,marginTop:1}},'Metodologia Julio Balestrin')
        )
      ),
      e('div',{style:{background:C.gdim,color:C.gtext,border:`1px solid ${C.green}`,padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:700,letterSpacing:'.05em'}},`SEM. ${state.currentWeek}`)
    ),
    // Pages
    page==='dash'&&e(Dashboard,{state,onGoTreino:goTreino}),
    page==='treino'&&e(TreinoPage,{state,dispatch,showToast}),
    page==='config'&&e(ConfigPage,{state,dispatch,showToast}),
    // Bottom nav
    e('nav',{style:{position:'fixed',bottom:0,left:0,right:0,zIndex:200,background:C.surface,borderTop:`1px solid ${C.border}`,display:'flex'}},
      NAV.map(([p,icon,label])=>e('button',{key:p,onClick:()=>setPage(p),style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 4px 8px',gap:4,background:'none',border:'none',color:page===p?C.green:C.muted,fontSize:10,fontWeight:600,letterSpacing:'.04em',textTransform:'uppercase',cursor:'pointer'}},
        e('span',{style:{fontSize:20,lineHeight:1}},icon),label
      ))
    ),
    e(Toast,{msg:toast.msg,visible:toast.visible})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
